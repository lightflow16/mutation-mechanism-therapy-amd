# Demo target configuration. Swapping the demo to a new variant is a config edit here,
# NOT a code change. Each entry carries everything the pipeline needs:
#   - class:   ONCOGENE_GOF | TUMOR_SUPPRESSOR_LOF   (drives the Planner's route decision)
#   - pathway: inhibitor_rag | structural_rescue
#   - uniprot/residue: for the AlphaFold DB fetch + residue validation
#   - civic_profile: filter string for CIViC molecular-profile evidence
#
# Per-target gotcha: verify residue numbering matches the UniProt sequence
# (the "is residue R at position N?" check in src/structure.py); restrict to missense.

targets:
  - gene: EGFR
    mutation: L858R
    class: ONCOGENE_GOF
    pathway: inhibitor_rag
    uniprot: P00533
    residue: 858
    wt_aa: L
    mut_aa: R
    civic_profile: "EGFR L858R"
    disease_context: "Lung Non-small Cell Carcinoma"

  - gene: EGFR
    mutation: T790M
    class: ONCOGENE_GOF
    pathway: inhibitor_rag
    uniprot: P00533
    residue: 790
    wt_aa: T
    mut_aa: M
    civic_profile: "EGFR T790M"
    disease_context: "EGFR-mutant NSCLC post-TKI"

  - gene: EGFR
    mutation: G719S
    class: UNKNOWN
    pathway: inhibitor_rag
    uniprot: P00533
    residue: 719
    wt_aa: G
    mut_aa: S
    civic_profile: ""
    disease_context: "Lung Non-small Cell Carcinoma"

  - gene: PIK3CA
    mutation: E545K
    class: ONCOGENE_GOF
    pathway: inhibitor_rag
    uniprot: P42336
    residue: 545
    wt_aa: E
    mut_aa: K
    civic_profile: "PIK3CA E545K"
    disease_context: "Breast Carcinoma"

  - gene: TP53
    mutation: R175H
    class: TUMOR_SUPPRESSOR_LOF
    pathway: structural_rescue
    uniprot: P04637
    residue: 175
    wt_aa: R
    mut_aa: H
    civic_profile: "TP53 R175H"
    disease_context: "Li-Fraumeni / pan-cancer"

serving:
  endpoints:
    planner:    { base_url: "http://localhost:8002/v1", model: "qwen2.5-3b-instruct" }
    reasoner:   { base_url: "http://localhost:8000/v1", model: "qwen2.5-vl-7b" }
    mechanism:  { base_url: "http://localhost:8001/v1", model: "qwen2.5-7b-instruct" }
  gpu_memory_utilization: 0.25

paths:
  shared: "/workspace/shared"
  metrics: "/workspace/shared/metrics"
  hf_cache: "/workspace/shared/hf_cache"
  lora_ckpts: "/workspace/shared/lora_ckpts"
  lora_adapter_final: "/workspace/shared/lora_adapter_final"

rescue:
  ddg_destabilizing_threshold: 1.0
  proteinmpnn_temperature: 0.8
  n_designs: 8
  pack_shell_radius: 8.0
  thermompnn_shell_radius: 15.0
  thermompnn_full_protein_max_residues: 80
  require_boltz: true
  require_esmfold: true
  require_proteinmpnn: true
  fold_confidence_ptm_threshold: 0.15

pipeline:
  always_run_all: true
  architectures: [single, cot, blackboard]
  demo_cases:
    - [EGFR, L858R]
    - [EGFR, T790M]
    - [PIK3CA, E545K]
    - [TP53, R175H]
  debate_cases:
    - [PIK3CA, E545K]
  vus_demo_cases:
    - [EGFR, G719S]
  vus_demo_architecture: single
  vus_require_empty_kb: true
  live_evidence: true
  use_cached_baseline: true
  run_eval_after_live: true
  export_metrics_bundle: true
  export_artifacts_bundle: true
  run_lora_train: false
  lora_distill_from_traces: true
  live_safety_probes: false
  store_llm_text: true
  use_llm_router: false
  multi_stage_cot: false
  verbose_progress: true
  demo_echo_thinking: true

confidence_benchmark:
  good_tm_threshold: 0.7
  good_lddt_threshold: 0.8
  local_plddt_threshold: 70
  operational_accept_threshold: 0.78
  proxy_good_mean_plddt: 70
